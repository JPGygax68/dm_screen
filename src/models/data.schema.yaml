---
"$schema": "https://json-schema.org/draft/2020-12/schema"
"$id": "https://dm-screen.local/schema/data.schema.yaml"

title: DMScreen Data Schema
description: Holds data recorded by DnD Dungeon Masters.
type: object

"$defs":
  PlayerId: { type: string, minLength: 1, description: "Unique player character identifier" }
  NpcId: { type: string, minLength: 1, description: "Unique non-player character identifier" }
  CreatureId: { type: string, minLength: 1, description: "Unique creature identifier" } 

  Campaigns:
    type: array
    description: List of campaigns
    items:
      "$ref": "#/$defs/Campaign"
    uniqueItems: true

  Campaign:
    type: object
    title: Campaign
    description: The root data structure containing all campaign information
    properties:
      name: { type: string, description: "Campaign name", default: "New Campaign" }
      description: { type: string, description: "Campaign description (optional)", optional: true }
      # party:
      #   type: array
      #   description: Set of player characters
      #   items:
      #     "$ref": "#/$defs/PlayerCharacter"
      #   uniqueItems: true
      # encounters:
      #   type: array
      #   description: List of encounters in the campaign
      #   items:
      #     "$ref": "#/$defs/Encounter"
    required: 
    - name
    # - party
    # - encounters
    additionalProperties: false

  PlayerCharacter:
    type: object
    title: Player Character
    description: A player character (PC) in the campaign
    properties:
      id: { "$ref": "#/$defs/PlayerId" }
      name: { type: string, description: "Character name" }
      race: { type: string, description: "Character race (recommended)" }
      classes:
        type: array
        description: Character classes (recommended)
        items: { type: string }
      hitPoints:
        type: integer
        minimum: 0
        description: Current hit points
      maxHitPoints:
        type: integer
        minimum: 0
        description: Maximum hit points
      conditions:
        type: array
        description: List of active conditions (can be empty)
        items:
          type: string
    required:
    - id
    - name
    - hitPoints
    - maxHitPoints
    - conditions
    additionalProperties: true

  NonPlayerCharacter:
    type: object
    title: Non-Player Character
    description: An NPC in the campaign
    properties:
      id: { "$ref": "#/$defs/NpcId" }
      name:
        type: string
        description: NPC name
    required:
    - id
    - name
    additionalProperties: true

  Combatant:
    type: object
    title: Combatant
    description: 'A participant in an encounter (PC, NPC, or creature). Lifecycle:
      current encounter'
    properties:
      type: { "$ref": "#/$defs/CombatantType" }
      id: 
        oneOf: [ { "$ref": "#/$defs/PlayerId" }, { "$ref": "#/$defs/NpcId" }, { "$ref": "#/$defs/CreatureId" } ]
        description: 'Unique identifier for the combatant (must match a PC, NPC, or creature
          in the campaign)'
      initiativeRoll:
        type: integer
        description: Initiative roll result
      hitPoints:
        type: integer
        minimum: 0
        description: Current hit points (initialized from source, persisted for PCs
          only)
      temporaryHitPoints:
        type: integer
        minimum: 0
        description: Temporary hit points (optional)
      conditions:
        type: array
        description: List of active conditions
        items:
          type: string
    required:
    - type
    - initiativeRoll
    - hitPoints
    - conditions
    additionalProperties: false

  CombatantType:
    type: string
    enum:
    - pc
    - npc
    - creature
    description: Combatant type to guide UI behavior

  CombatantRef:
    type: object
    properties:
      type: { "$ref": "#/$defs/CombatantType" }
      id:
        oneOf: [ { "$ref": "#/$defs/PlayerId" }, { "$ref": "#/$defs/NpcId" }, { "$ref": "#/$defs/CreatureId" } ]
        description: 'Unique identifier PC, NPC or Creature'
    description: Unique identifier for a combatant (must match a combatant id in Encounter.combatants)

  ActionType:
    type: string
    enum:
    - attack
    - cast_spell
    - interact
    - dash
    - disengage
    - dodge
    - help
    - hide
    - ready
    - search
    - use_object
    description: Type of action taken
    
  Round:
    type: object
    title: Combat Round
    description: A round of combat containing all turns
    properties:
      number: { type: integer, minimum: 1, description: "Round number (must be in sync with array index in Encounter.rounds)" }
      turns:
        type: array
        description: List of turns in this round
        items:
          "$ref": "#/$defs/Turn"
    required:
    - number
    - turns
    additionalProperties: false

  Turn:
    type: object
    title: Combat Turn
    description: A single combatant's turn in a round
    properties:
      combatantId:
        "$ref": "#/$defs/CombatantRef"
        description: ID of the combatant taking this turn (must match a combatant
          id in Encounter.combatants)
      events:
        type: array
        description: Events that occurred during this turn (can be empty)
        items:
          "$ref": "#/$defs/Event"
    required:
    - combatantId
    - events
    additionalProperties: false

  Success:
    type: string
    enum:
    - critical_miss
    - miss
    - hit
    - critical_hit
    description: Degree of success of an attack or spell effect

  DamageType:
    type: string
    enum:
    - bludgeoning
    - piercing
    - slashing
    - fire
    - cold
    - lightning
    - acid
    - poison
    - psychic
    - necrotic
    - radiant
    - thunder
    description: Type of damage dealt

  EventType:
    type: string
    enum:
    - action
    - effect
    - movement
    - other
    description: Classification of an event

  Event:
    type: object
    title: Combat Event
    description: An event that occurred during a turn
    properties:
      type: { "$ref": "#/$defs/EventType" }
      data:
        oneOf:
        - "$ref": "#/$defs/ActionEvent"
        - "$ref": "#/$defs/EffectEvent"
        - "$ref": "#/$defs/MovementEvent"
        - "$ref": "#/$defs/OtherEvent"
        description: Event-specific data
      comment:
        type: string
        description: Optional comment about the event
    required:
    - type
    - data
    additionalProperties: false

  ActionEvent:
    type: object
    title: Action
    description: An action taken by a combatant
    properties:
      type:
        "$ref": "#/$defs/ActionType"
      description:
        type: string
        description: Optional description of the action
    required:
    - type
    additionalProperties: false
  
  AttackAction:
    type: object
    title: Attack Action
    description: A melee or ranged attack
    properties:
      type:
        const: attack
      targetId:
        "$ref": "#/$defs/CombatantRef"
        description: ID of target combatant (must match a combatant id in Encounter.combatants)
      hit: { "$ref": "#/$defs/Success", description: Whether the attack hit }
      damage: {type: integer, minimum: 0, description: Damage dealt (optional)}
      damageType: { "$ref": "#/$defs/DamageType" }
    required:
    - type
    - targetId
    - hit
    additionalProperties: false

  CastSpellAction:
    type: object
    title: Cast Spell Action
    description: Casting a spell
    properties:
      type: { const: cast_spell }
      spellName: { type: string, description: Name of the spell }
      target: { type: string, description: Target designation (combatant id, 'area', 'self', etc.) }
      targetIds:
        type: array
        description: List of target combatant IDs (must match combatant ids in Encounter.combatants
          if present)
        items:
          "$ref": "#/$defs/CombatantRef"
      hit: { "$ref": "#/$defs/Success", description: Whether the spell hit/affected targets (optional) }
      damage: { type: integer, minimum: 0, description: Damage dealt (optional) }
      damageType: { "$ref": "#/$defs/DamageType", description: Type of damage (optional) }
    required:
    - type
    - spellName
    additionalProperties: false

  InteractAction:
    type: object
    title: Interact Action
    description: Interacting with an object or creature
    properties:
      type: { const: interact }
      target:
        type: string
        description: Target (combatant id or designation)
      description:
        type: string
        description: Description of the interaction
    required:
    - type
    additionalProperties: false
  
  DashAction:
    type: object
    title: Dash Action
    description: Dashing/moving extra distance
    properties:
      type: { const: dash }
    required:
    - type
    additionalProperties: false
  
  DisengageAction:
    type: object
    title: Disengage Action
    description: Disengaging to avoid opportunity attacks
    properties:
      type: { const: disengage }
    required:
    - type
    additionalProperties: false

  DodgeAction:
    type: object
    title: Dodge Action
    description: Dodging to increase AC
    properties:
      type: { const: dodge }
    required:
    - type
    additionalProperties: false

  HelpAction:
    type: object
    title: Help Action
    description: Helping another combatant
    properties:
      type: { const: help }
      targetId:
        "$ref": "#/$defs/CombatantRef"
        description: ID of the combatant being helped (must match a combatant id in
          Encounter.combatants)
    required:
    - type
    - targetId
    additionalProperties: false

  HideAction:
    type: object
    title: Hide Action
    description: Attempting to hide
    properties:
      type: { const: hide }
    required:
    - type
    additionalProperties: false

  ReadyAction:
    type: object
    title: Ready Action
    description: Readying an action for later in the round
    properties:
      type: { const: ready }
      description:
        type: string
        description: Description of the readied action
    required:
    - type
    additionalProperties: false

  SearchAction:
    type: object
    title: Search Action
    description: Searching for something
    properties:
      type: { const: search }
      description:
        type: string
        description: Description of what is being searched
    required:
    - type
    additionalProperties: false

  UseObjectAction:
    type: object
    title: Use Object Action
    description: Using an object or item
    properties:
      type: { const: use_object }
      description:
        type: string
        description: Description of the object being used
    required:
    - type
    additionalProperties: false

  EffectEvent:
    type: object
    title: Effect
    description: A magical or environmental effect
    properties:
      name:
        type: string
        description: Name of the effect
      description:
        type: string
        description: Description of the effect
      affectedCombatants:
        type: array
        description: IDs of affected combatants
        items:
          "$ref": "#/$defs/CombatantRef"
    required:
    - name
    additionalProperties: false

  MovementEvent:
    type: object
    title: Movement
    description: Movement of a combatant
    properties:
      distance:
        type: number
        minimum: 0
        description: Distance moved
      direction:
        type: string
        description: Direction or destination
    additionalProperties: false
  
  OtherEvent:
    type: object
    title: Other Event
    description: Any other event not fitting other categories
    properties:
      description:
        type: string
        description: Description of the event
    additionalProperties: false

  Encounter:
    type: object
    title: Encounter
    description: A combat encounter containing combatants and rounds
    properties:
      combatants:
        type: object
        description: Map of combatants by CombatantRef (Combatant type + ID)
        minProperties: 1
      initiativeOrder:
        type: array
        description: List of combatant IDs in initiative order
        items:
          "$ref": "#/$defs/CombatantRef"
        minItems: 1
      currentRound:
        type: integer
        minimum: 1
        description: Current round number
      currentTurn:
        type: integer
        minimum: 0
        description: Current turn index in the round
      rounds:
        type: array
        description: List of combat rounds (can be implemented as indexed array or
          dictionary)
        items:
          "$ref": "#/$defs/Round"
    required:
    - combatants
    - initiativeOrder
    - currentRound
    - currentTurn
    - rounds
    additionalProperties: false

properties:
  campaigns:
    "$ref": "#/$defs/Campaigns"
