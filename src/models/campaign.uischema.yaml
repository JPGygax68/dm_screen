---
# Campaign shell UI schema
# Target renderer: JSON Forms (Vue/React)
# Purpose: layout, grouping, ordering, and control hints only.
# Data validity remains defined by campaign.schema.yaml.

$id: "https://dm-screen.local/schema/campaign.uischema.yaml"

# Root resolves to Campaign (for now)
type: VerticalLayout
elements:
  - type: VerticalLayout
    elements:
      - type: Control
        label: Campaign Name
        scope: "#/properties/name"
      - type: Control
        label: Campaign description
        scope: "#/properties/description"
        options: { multi: true, rows: 5 }

x-actions:
  - id: back-to-campaign-list
    command: nav.backToCampaignList
    label: Back
    placement: header-left
    style: secondary
    when: always

options:
  showUnfocusedDescription: true
  trim: true
