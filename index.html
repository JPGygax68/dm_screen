<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM Screen Combat Tracker Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="tracker-shell">
    <header class="tracker-title">
      <div>
        <h1>Combat Tracker Prototype</h1>
        <p>Interactive turn entry, active-turn focus, and a lower input panel.</p>
      </div>
      <div class="header-actions">
        <button id="startEncounterBtn" class="secondary-btn">Start encounter</button>
        <button id="endEncounterBtn" class="secondary-btn">End encounter</button>
      </div>
    </header>

    <section class="status-bar">
      <div><strong>State:</strong> <span id="encounterState">creating</span></div>
      <div><strong>Active turn:</strong> <span id="activeTurnLabel">—</span></div>
    </section>

    <section class="tracker">
      <div class="frozen-column left-column">
        <div class="column-header">Round</div>
        <div class="current-state-label">Current state</div>
        <div id="roundLabels"></div>
      </div>

      <div id="combatantColumns" class="scrollable-columns"></div>

      <div class="frozen-column right-column">
        <div class="column-header">Round Notes</div>
        <div class="current-state-label">Notes (current)</div>
        <div id="roundNotes"></div>
      </div>
    </section>

    <section id="inputPanel" class="input-panel" aria-live="polite">
      <div class="panel-header">
        <div>
          <h2 id="panelTitle">Turn entry</h2>
          <p id="panelHint">Select a turn to begin.</p>
        </div>
        <div class="panel-actions">
          <button id="unlockEditBtn" class="secondary-btn">Unlock edit</button>
          <button id="closePanelBtn" class="secondary-btn">Close</button>
        </div>
      </div>

      <div class="panel-body">
        <div class="action-section">
          <div id="actionMenu" class="action-menu"></div>
          <div id="subpanelContent" class="subpanel"></div>
        </div>

        <div class="preview-section">
          <div class="preview-label">Live shorthand preview</div>
          <div id="previewText" class="preview-text">—</div>
          <div class="panel-footer">
            <button id="clearDraftBtn" class="secondary-btn">Clear</button>
            <button id="cancelDraftBtn" class="secondary-btn">Cancel</button>
            <button id="confirmDraftBtn" class="primary-btn">Confirm</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
